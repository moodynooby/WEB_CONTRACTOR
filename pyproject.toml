[project]
name = "web-contractor"
version = "0.2.0"
description = "Ultra-minimal lead generation and outreach automation with Textual TUI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.47.0",
    "requests>=2.32.5",
    "beautifulsoup4>=4.14.3",
    "selenium>=4.40.0",
    "webdriver-manager>=4.0.0",
]

[dependency-groups]
dev = [
    "mypy>=1.0.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.15.0",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
