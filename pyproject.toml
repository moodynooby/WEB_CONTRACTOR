[project]
name = "web-contractor"
version = "0.3.0"
description = "Ultra-minimal lead generation and outreach automation with Textual TUI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.47.0",
    "requests>=2.32.5",
    "playwright>=1.40.0",
    "python-dotenv>=1.2.1",
    "click>=8.1.7",
    "beautifulsoup4>=4.12.0",
    "peewee>=4.0.1",
    "email-validator>=2.3.0",
    "groq>=0.4.0",
    "transformers>=4.35.0",
    "torch>=2.0.0",
    "sentence-transformers>=2.2.0",
]

[dependency-groups]
dev = [
    "mypy>=1.0.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.15.0",
    "uncomment>=2.11.0",
    "types-requests>=2.32.4.20260107",
    "types-peewee>=4.0.0.20260223",
    "types-beautifulsoup4>=4.12.0.20250516",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = "core.db_peewee"
disable_error_code = ["attr-defined", "arg-type", "assignment"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
