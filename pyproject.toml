[project]
name = "web-contractor"
version = "1"
description = "Ultra-minimal lead generation and outreach automation with Textual TUI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.47.0",
    "requests>=2.32.5",
    "playwright>=1.40.0",
    "python-dotenv>=1.2.1",
    "click>=8.1.7",
    "beautifulsoup4>=4.12.0",
    "peewee>=4.0.1",
    "email-validator>=2.3.0",
    "groq>=0.4.0",
    "email-scraper>=0.6",
    "mailscout>=0.1.1",
    "mkdocs>=1.6.1",
    "mkdocstrings[python]>=1.0.3",
    "mkdocs-material>=9.7.5",
    "mkdocs-api-autonav>=0.4.0",
]

[project.scripts]
web-contractor = "cli:main"
wc-discover = "cli:discover"
wc-audit = "cli:audit"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core", "ui", "agent_contexts"]
include = ["*.py"]

[dependency-groups]
dev = [
    "mypy>=1.0.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.15.0",
    "uncomment>=2.11.0",
    "types-requests>=2.32.4.20260107",
    "types-peewee>=4.0.0.20260223",
    "types-beautifulsoup4>=4.12.0.20250516",
    "hatchling>=1.0.0",
]


